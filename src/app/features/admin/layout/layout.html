<div class="page-layout admin-layout" [class.admin-layout--collapsed]="!sidebarOpen()">
  <!-- Mobile Backdrop -->
  <div class="sidebar-backdrop" *ngIf="sidebarOpen()" (click)="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="sidebarOpen()">
    <div class="sidebar-logo">
      <svg class="logo" viewBox="0 0 24 24" fill="currentColor"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5H6.5C5.84 5 5.29 5.42 5.08 6.01L3 12V20C3 20.55 3.45 21 4 21H5C5.55 21 6 20.55 6 20V19H18V20C18 20.55 18.45 21 19 21H20C20.55 21 21 20.55 21 20V12L18.92 6.01Z"/></svg>
      <span class="title">{{ 'app.name' | translate }}</span>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/admin/users" routerLinkActive="active" class="sidebar-link" (click)="closeSidebarOnMobile()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span>{{ 'nav.users' | translate }}</span>
      </a>
      <a routerLink="/admin/cars" routerLinkActive="active" class="sidebar-link" (click)="closeSidebarOnMobile()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        <span>{{ 'nav.cars' | translate }}</span>
      </a>
      <a routerLink="/admin/orders" routerLinkActive="active" class="sidebar-link" (click)="closeSidebarOnMobile()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>{{ 'nav.orders' | translate }}</span>
      </a>
    </nav>
    
    <div class="sidebar-footer">
      <a href="javascript:void(0)" class="sidebar-link link-danger" (click)="auth.logout(); closeSidebarOnMobile()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>{{ 'nav.logout' | translate }}</span>
      </a>
    </div>

    <button class="sidebar-toggle-btn" (click)="toggleSidebar()" *ngIf="isDesktop()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline [attr.points]="sidebarOpen() ? '15 18 9 12 15 6' : '9 18 15 12 9 6'" />
      </svg>
    </button>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <header class="topbar">
      <div class="flex items-center gap-4">
        <button class="topbar-mobile-toggle" (click)="toggleSidebar()" [class.show-desktop]="!sidebarOpen()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="topbar-title">{{ titleService.title() | translate }}</h1>
      </div>
      <div class="topbar-controls">
        <app-theme-toggle />
        <app-lang-toggle />
      </div>
    </header>
    <main class="page-content">
      <router-outlet />
    </main>
  </div>
</div>
