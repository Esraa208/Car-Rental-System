<div class="car-card" (click)="view.emit(car())">
  <div class="car-card-image">
    <div class="car-card-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
        <path d="M7 17a2 2 0 100 4 2 2 0 000-4zm10 0a2 2 0 100 4 2 2 0 000-4z"/>
        <path d="M5 17h2m2 0h6m2 0h2m-14 0l1.1-4.4a2 2 0 011.9-1.6h10a2 2 0 011.9 1.6l1.1 4.4M4 10V7a2 2 0 012-2h12a2 2 0 012 2v3"/>
      </svg>
    </div>
    <div class="car-card-badge">
       <span class="badge badge-primary">{{ car().model }}</span>
    </div>
  </div>
  <div class="car-card-body">
    <div class="car-card-header">
      <div>
        <div class="car-brand">{{ car().brand }}</div>
        <h3 class="car-card-title">{{ car().name }}</h3>
      </div>
    </div>
    
    <div class="car-card-meta">
       <span class="flex items-center gap-2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg> {{ car().kilometers | number }} km</span>
    </div>

    <div class="car-card-footer">
      <div class="car-price">
        {{ car().price_per_day | number:'1.0-0' }}
        <span class="car-price-unit">{{ 'common.sar' | translate }} / {{ 'common.day' | translate }}</span>
      </div>
      <button class="btn btn-primary btn-sm btn-view">{{ 'common.view' | translate }}</button>
    </div>
  </div>
</div>
