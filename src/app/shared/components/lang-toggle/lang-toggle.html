<button
  class="btn btn-ghost btn-sm lang-btn"
  (click)="theme.toggleLang()"
  [attr.aria-label]="theme.isRtl() ? 'Switch to English' : 'التبديل إلى العربية'"
  [title]="theme.isRtl() ? 'Switch to English' : 'التبديل إلى العربية'"
>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-svg">
    <circle cx="12" cy="12" r="10"/>
    <line x1="2" y1="12" x2="22" y2="12"/>
    <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
  </svg>
  <span class="lang-text">{{ theme.isRtl() ? 'EN' : 'ع' }}</span>
</button>
